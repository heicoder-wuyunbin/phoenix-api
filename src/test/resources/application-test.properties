# 测试环境配置
spring.application.name=phoenix-api-test

# H2 数据库配置（PostgreSQL 兼容模式）
spring.datasource.url=jdbc:h2:mem:phoenix_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# MyBatis Plus 配置
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=isDel
mybatis-plus.global-config.db-config.logic-delete-value=true
mybatis-plus.global-config.db-config.logic-not-delete-value=false

# SQL 初始化
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT 配置
jwt.secret=test_jwt_secret_key_for_integration_tests_2
jwt.expire=86400000

# 站点配置
site.reg-option=3
site.base-url=http://localhost:8080

# Redis 配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0